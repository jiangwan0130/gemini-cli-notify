name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: go build -ldflags="-s -w" -o gemini-cli-notify.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: gemini-cli-notify.exe
          generate_release_notes: true
